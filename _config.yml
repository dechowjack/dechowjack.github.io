# =============================================================================
# SITE SETTINGS
# =============================================================================
title: "Jack Dechow"
name: "Jack Dechow"
description: "Postdoctoral Researcher in Mountain Hydrology"
url: "https://dechowjack.github.io"
baseurl: ""

# =============================================================================
# THEME
# =============================================================================
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"  # options: air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

# =============================================================================
# AUTHOR (populates the sidebar on inner pages)
# =============================================================================
author:
  name: "Jack Dechow"
  avatar: "/assets/images/bio-photo.jpg"  # add your photo here
  bio: >
    Postdoctoral Researcher studying mountain snowmelt and hydrological modeling
    at the University of North Carolina, Chapel Hill.
  location: "Chapel Hill, NC"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:jldechow@unc.edu"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/dechowjack"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0003-3121-7934"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=2MyOL_oAAAAJ&hl=en"
    - label: "Twitter / X"
      icon: "fab fa-fw fa-x-twitter"
      url: "https://twitter.com/dechow_jack"

# =============================================================================
# NAVIGATION
# =============================================================================

# =============================================================================
# DEFAULTS (apply layouts automatically to page types)
# =============================================================================
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# =============================================================================
# PLUGINS (required for GitHub Pages)
# =============================================================================
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-remote-theme
  - jekyll-include-cache

# =============================================================================
# MISC
# =============================================================================
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
timezone: America/New_York
